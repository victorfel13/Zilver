# Build de producción → carpeta docs/ en main (para GitHub Pages).
# Configura Pages: Settings → Pages → Branch: main → Folder: /docs
#
# El push del bot lleva [skip ci] y paths-ignore evita bucles.
# Settings → Actions → General → Workflow permissions: Read and write.

name: Publish site to docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: npm ci && npm run build

      - name: Sync dist → docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r dist/. docs/
          touch docs/.nojekyll

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/
          if git diff --staged --quiet; then
            echo "No changes to docs"
            exit 0
          fi
          git commit -m "chore(pages): update docs [skip ci]"
          git push
