# Build + sube solo la carpeta dist/ a la rama gh-pages.
#
# En GitHub: Settings → Pages → Source: "Deploy from a branch"
#            Branch: gh-pages  /  folder: / (root)   ← NO uses main
#
# Si el workflow no puede hacer push: Settings → Actions → General →
# "Workflow permissions" → Read and write permissions.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build
          touch dist/.nojekyll

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
